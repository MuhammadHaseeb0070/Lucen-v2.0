# Supabase local dev config. Kept minimal to avoid parse errors.
# Project linking is handled by `supabase link --project-ref` at deploy time.

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 17

[studio]
enabled = true
port = 54323

[functions.chat-proxy]
verify_jwt = false

[functions.deduct-credits]
verify_jwt = false
