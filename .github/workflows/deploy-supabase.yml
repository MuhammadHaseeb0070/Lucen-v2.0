name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      # Workflow edits don’t live under supabase/ — include them so secrets deploy + function list updates actually run.
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function Secrets
        run: |
          supabase secrets set OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}"
          supabase secrets set VITE_APP_URL="${{ secrets.VITE_APP_URL }}"
          supabase secrets set LEMON_SQUEEZY_API_KEY="${{ secrets.LEMON_SQUEEZY_API_KEY }}"
          supabase secrets set LEMON_SQUEEZY_STORE_ID="${{ secrets.LEMON_SQUEEZY_STORE_ID }}"
          supabase secrets set LEMON_SQUEEZY_WEBHOOK_SECRET="${{ secrets.LEMON_SQUEEZY_WEBHOOK_SECRET }}"
          supabase secrets set LS_VARIANT_REGULAR="${{ secrets.LS_VARIANT_REGULAR }}"
          supabase secrets set LS_VARIANT_PRO="${{ secrets.LS_VARIANT_PRO }}"
          # Do not set SUPABASE_* via CLI — names are reserved; Edge Functions already receive
          # SUPABASE_URL, SUPABASE_ANON_KEY, and SUPABASE_SERVICE_ROLE_KEY from the platform.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy chat-proxy --no-verify-jwt
          supabase functions deploy deduct-credits --no-verify-jwt
          supabase functions deploy ls-checkout --no-verify-jwt
          supabase functions deploy ls-webhook --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
