name: Deploy Supabase

on:
  push:
    branches: [main, dev]
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:

concurrency:
  group: supabase-deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.225.0

      - name: Link Project
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_ID="${{ secrets.PROD_SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}"
            DB_PASSWORD="${{ secrets.PROD_SUPABASE_DB_PASSWORD || secrets.SUPABASE_DB_PASSWORD }}"
          else
            PROJECT_ID="${{ secrets.DEV_SUPABASE_PROJECT_ID }}"
            DB_PASSWORD="${{ secrets.DEV_SUPABASE_DB_PASSWORD }}"
          fi

          if [ -z "$PROJECT_ID" ]; then
            echo "Error: PROJECT_ID is not set for branch ${{ github.ref_name }}"
            exit 1
          fi

          supabase link --project-ref "$PROJECT_ID" --password "$DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Push Database Migrations
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_ID="${{ secrets.PROD_SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}"
          else
            PROJECT_ID="${{ secrets.DEV_SUPABASE_PROJECT_ID }}"
          fi
          supabase db push --project-ref "$PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Edge Functions
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_ID="${{ secrets.PROD_SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID }}"
          else
            PROJECT_ID="${{ secrets.DEV_SUPABASE_PROJECT_ID }}"
          fi
          supabase functions deploy chat-proxy        --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy deduct-credits    --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy ls-checkout       --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy ls-webhook        --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy classify-intent   --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy describe-image    --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy generate-title    --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy embed             --project-ref "$PROJECT_ID" --no-verify-jwt
          supabase functions deploy retrieve-chunks   --project-ref "$PROJECT_ID" --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}